<!DOCTYPE html>
<html>
<head>
  <title>Student Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Student Login</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button onclick="login()">Login</button>
  <p>Not Registered? <a href="#" onclick="showRegister()">Register</a></p>
</div>

<div class="container" id="registerBox" style="display:none;">
  <h2>Register</h2>
  <input type="text" id="fullname" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="mobile" placeholder="Mobile">
  <input type="text" id="fathername" placeholder="Father Name">
  <input type="text" id="roll" placeholder="Roll">
  <input type="text" id="regno" placeholder="Registration No">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Submit</button>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>
<link rel="stylesheet" href="css/style.css">
<style>
.register-container{
  max-width:500px;
  margin:60px auto;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}
.register-container h2{
  text-align:center;
  margin-bottom:20px;
}
.form-group{
  margin-bottom:15px;
}
.error{
  color:red;
  font-size:13px;
}
.success{
  color:green;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="register-container">
  <h2>Student Registration</h2>

  <div class="form-group">
    <input type="text" id="fullname" placeholder="Full Name">
  </div>

  <div class="form-group">
    <input type="email" id="email" placeholder="Email Address">
  </div>

  <div class="form-group">
    <input type="text" id="mobile" placeholder="Mobile Number">
  </div>

  <div class="form-group">
    <input type="text" id="fathername" placeholder="Father Name">
  </div>

  <div class="form-group">
    <input type="text" id="roll" placeholder="Roll Number">
  </div>

  <div class="form-group">
    <input type="text" id="regno" placeholder="Registration Number">
  </div>

  <div class="form-group">
    <input type="password" id="password" placeholder="Password">
  </div>

  <div class="form-group">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
  </div>

  <button onclick="register()">Create Account</button>

  <p style="text-align:center;margin-top:15px;">
    Already have account? <a href="index.html">Login</a>
  </p>

  <div id="message"></div>

</div>

<script>
const API = "PASTE_YOUR_GOOGLE_SCRIPT_WEB_APP_URL";

function register(){

  const fullname = document.getElementById("fullname").value.trim();
  const email = document.getElementById("email").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const fathername = document.getElementById("fathername").value.trim();
  const roll = document.getElementById("roll").value.trim();
  const regno = document.getElementById("regno").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  const messageBox = document.getElementById("message");

  // Validation
  if(!fullname || !email || !mobile || !fathername || !roll || !regno || !password){
    messageBox.innerHTML = "<p class='error'>All fields are required!</p>";
    return;
  }

  if(password !== confirmPassword){
    messageBox.innerHTML = "<p class='error'>Passwords do not match!</p>";
    return;
  }

  if(password.length < 6){
    messageBox.innerHTML = "<p class='error'>Password must be at least 6 characters!</p>";
    return;
  }

  // Send Data to Google Sheet
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"register",
      fullname,
      email,
      mobile,
      fathername,
      roll,
      regno,
      password
    })
  })
  .then(res=>res.text())
  .then(data=>{
    if(data==="Registered"){
      messageBox.innerHTML = "<p class='success'>Registration Successful! Redirecting...</p>";
      setTimeout(()=>{
        window.location="index.html";
      },2000);
    }else{
      messageBox.innerHTML = "<p class='error'>Something went wrong!</p>";
    }
  })
  .catch(()=>{
    messageBox.innerHTML = "<p class='error'>Server Error!</p>";
  });
}
</script>

</body>
</html>
